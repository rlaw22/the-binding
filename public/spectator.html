<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#6B5CE7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>The Binding — Spectator Mode</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{background:#1A1A2E;color:#F5F0E1;font-family:Georgia,serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
.icon{font-size:3em;margin-bottom:16px;opacity:0.6;}
h1{color:#6B5CE7;font-size:1.6em;letter-spacing:3px;margin-bottom:12px;}
p{color:#F5F0E1aa;font-size:1.05em;line-height:1.7;max-width:420px;margin-bottom:8px;}
.sub{color:#F5F0E166;font-size:0.88em;font-style:italic;margin-bottom:24px;}
.cta{display:inline-block;background:#6B5CE7;color:#fff;padding:14px 32px;border-radius:8px;text-decoration:none;font-family:Georgia,serif;font-size:1.05em;font-weight:600;transition:all 0.2s;}
.cta:hover{background:#7d6ef0;transform:scale(1.03);}
.hint{color:#F5F0E144;font-size:0.78em;margin-top:20px;}
@media(max-width:500px){
  h1{font-size:1.3em;letter-spacing:2px;}
  p{font-size:0.95em;}
  .icon{font-size:2.4em;}
  body{padding:20px 16px;}
}
</style>
</head>
<body>
<div class="icon">👁️</div>
<h1>SPECTATOR MODE</h1>
<p>Watch live adventures unfold in real-time. See every twist of fate as your friends brave The Binding.</p>
<p class="sub">Coming soon — spectator mode is being forged.</p>
<a href="/" class="cta">Return to The Binding</a>
<div class="hint">Spectator links will appear here when a host shares their session.</div>
</body>
</html>
