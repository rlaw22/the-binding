<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#C9A84C">
<title>The Binding — Offline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{
  background:#1A1A2E;
  color:#F5F0E1;
  font-family:Georgia,serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:24px;
  text-align:center;
}
.offline-icon{
  font-size:3em;
  margin-bottom:20px;
  opacity:0.7;
}
h1{
  color:#C9A84C;
  font-size:1.5em;
  letter-spacing:2px;
  margin-bottom:16px;
}
p{
  color:#F5F0E1aa;
  font-size:1.05em;
  line-height:1.7;
  max-width:420px;
  margin-bottom:28px;
}
.retry-btn{
  background:#C9A84C;
  border:none;
  color:#1A1A2E;
  padding:14px 36px;
  border-radius:8px;
  cursor:pointer;
  font-weight:600;
  font-family:Georgia,serif;
  font-size:1.05em;
  transition:all 0.2s;
}
.retry-btn:hover{
  background:#E8A838;
}
.retry-btn:active{
  transform:scale(0.97);
}
.status{
  margin-top:16px;
  color:#F5F0E144;
  font-size:0.85em;
  font-style:italic;
}
</style>
</head>
<body>
  <div class="offline-icon">📖</div>
  <h1>You're Offline</h1>
  <p>The Binding will reconnect when your connection returns. Your story is waiting.</p>
  <button class="retry-btn" onclick="retry()">Try Again</button>
  <div class="status" id="status"></div>
  <script>
    function retry() {
      var status = document.getElementById('status');
      status.textContent = 'Reconnecting...';
      navigator.serviceWorker.getRegistration().then(function(reg) {
        if (reg && reg.active) {
          reg.active.postMessage({ type: 'SKIP_WAITING' });
        }
      });
      // Attempt navigation to root
      window.location.href = '/';
    }

    // Auto-retry when back online
    window.addEventListener('online', function() {
      document.getElementById('status').textContent = 'Connection restored — reloading...';
      setTimeout(function() { window.location.href = '/'; }, 800);
    });

    // Show current status
    if (!navigator.onLine) {
      document.getElementById('status').textContent = 'Waiting for connection...';
    }
  </script>
</body>
</html>
