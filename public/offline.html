<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Binding — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1A1A2E;
      color: #E0D6C8;
      font-family: 'Georgia', 'Times New Roman', serif;
      text-align: center;
      padding: 2rem;
    }

    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.7;
    }

    h1 {
      font-size: 1.8rem;
      color: #C9A84C;
      margin-bottom: 0.75rem;
      font-weight: normal;
      letter-spacing: 0.05em;
    }

    p {
      font-size: 1.1rem;
      line-height: 1.6;
      max-width: 400px;
      color: #A09888;
      margin-bottom: 2rem;
    }

    .divider {
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #C9A84C, transparent);
      margin: 1.5rem 0;
    }

    button {
      background: transparent;
      border: 1px solid #C9A84C;
      color: #C9A84C;
      padding: 0.6rem 2rem;
      font-family: 'Georgia', serif;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #C9A84C;
      color: #1A1A2E;
    }

    .footer {
      position: fixed;
      bottom: 1.5rem;
      font-size: 0.8rem;
      color: #555;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="icon">📖</div>
  <h1>The Binding</h1>
  <div class="divider"></div>
  <p>You appear to be offline. The story will continue once your connection is restored.</p>
  <button onclick="window.location.reload()">Try Again</button>
  <div class="footer">THE BINDING · A TEXT ADVENTURE</div>
</body>
</html>
